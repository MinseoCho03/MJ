<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Opportunity Atlas — Funder Portal</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-portal="funder">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">OA</div>
        <div>
          <strong>Opportunity Atlas</strong>
          <span>Funder intelligence dashboard</span>
        </div>
      </div>
      <nav aria-label="Primary">
        <div class="nav-group">
          <span>Funder Portal</span>
          <button class="nav-link active" data-page="overview">Overview</button>
          <button class="nav-link" data-page="discovery">Discover Projects</button>
          <button class="nav-link" data-page="queue">Review Queue</button>
          <button class="nav-link" data-page="funder-history">History</button>
          <button class="nav-link" data-page="signals">Funding Signals</button>
        </div>
      </nav>
      <div class="sidebar-note">
        <strong>Responsible use</strong>
        <p>OECD records are used as funding intelligence, not talent data.</p>
        <button class="reset-demo" id="reset-demo-data" type="button">Reset demo data</button>
      </div>
      <a href="../index.html" style="display:block;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,0.07);color:#a8c4e0;font-size:13px;text-decoration:none;text-align:center;">← Switch portal</a>
    </aside>

    <main class="app-shell">
      <div class="top-tabs" aria-label="Quick tabs">
        <button class="top-tab route-btn" data-page="messages" type="button">Messages</button>
      </div>
      <section id="overview" class="page active" aria-labelledby="overview-title"></section>
      <section id="discovery" class="page" aria-labelledby="discovery-title"></section>
      <section id="detail" class="page" aria-labelledby="detail-title"></section>
      <section id="builder-profile" class="page" aria-labelledby="builder-profile-title"></section>
      <section id="queue" class="page" aria-labelledby="queue-title"></section>
      <section id="funder-history" class="page" aria-labelledby="funder-history-title"></section>
      <section id="signals" class="page" aria-labelledby="signals-title"></section>
      <section id="messages" class="page" aria-labelledby="messages-title"></section>
      <section id="submit" class="page" aria-labelledby="submit-title"></section>
    </main>

    <script src="../data/oecd-data.js"></script>
    <script src="../app.js"></script>
  </body>
</html>
