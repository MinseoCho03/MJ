<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>First Spark — Builder Portal</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body data-portal="builder">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">FS</div>
        <div>
          <strong>First Spark</strong>
          <span>Builder portal</span>
        </div>
      </div>
      <nav aria-label="Primary">
        <div class="nav-group">
          <span>Builder Portal</span>
          <button class="nav-link active" data-page="submit">Submit Project</button>
          <button class="nav-link" data-page="builder-history">Submission History</button>
          <button class="nav-link" data-page="builder-notifications">Notifications</button>
        </div>
      </nav>
      <div class="sidebar-note">
        <strong>How it works</strong>
        <p>Submit your project, review your history, and see demo funder visibility signals.</p>
        <button class="reset-demo" id="reset-demo-data" type="button">Reset demo data</button>
      </div>
      <a href="../index.html" style="display:block;padding:10px 14px;border-radius:8px;background:rgba(255,255,255,0.07);color:#a8c4e0;font-size:13px;text-decoration:none;text-align:center;">← Switch portal</a>
    </aside>

    <main class="app-shell">
      <div class="top-tabs" aria-label="Quick tabs">
        <button class="top-tab route-btn" data-page="messages" type="button">Messages</button>
      </div>
      <section id="overview" class="page" aria-labelledby="overview-title"></section>
      <section id="discovery" class="page" aria-labelledby="discovery-title"></section>
      <section id="detail" class="page" aria-labelledby="detail-title"></section>
      <section id="queue" class="page" aria-labelledby="queue-title"></section>
      <section id="signals" class="page" aria-labelledby="signals-title"></section>
      <section id="submit" class="page active" aria-labelledby="submit-title"></section>
      <section id="builder-history" class="page" aria-labelledby="builder-history-title"></section>
      <section id="submission-detail" class="page" aria-labelledby="submission-detail-title"></section>
      <section id="builder-notifications" class="page" aria-labelledby="builder-notifications-title"></section>
      <section id="messages" class="page" aria-labelledby="messages-title"></section>
    </main>

    <script src="../data/oecd-data.js"></script>
    <script>
      // Override default page to builder submit view
      window.__INITIAL_PAGE__ = "submit";
    </script>
    <script src="../app.js"></script>
  </body>
</html>
